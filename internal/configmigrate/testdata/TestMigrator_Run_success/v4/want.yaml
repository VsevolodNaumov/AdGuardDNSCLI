schema_version: 4
dns:
  server:
    bind_retry:
      enabled: true
      count: 4
      interval: 1s
    listen_addresses:
      - address: '192.0.2.1:53'
    pending_requests:
      enabled: true
  upstream:
    groups:
      'default':
        address: 'https://unfiltered.adguard-dns.com/dns-query'
        autodevice:
          enabled: false
      'private':
        address: '192.0.2.1'
        autodevice:
          enabled: false
      'example':
        address: 'https://d.adguard.ch/dns-query'
        match:
          - client: '192.0.2.0/24'
            question_domain: 'local.example'
        autodevice:
          enabled: false
